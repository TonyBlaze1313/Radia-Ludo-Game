<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radia Ludo · Radial Board & 3D Dice | 3-10 Players</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="game-container">
    <div class="ludo-panel">
        <div class="top-bar">
            <div class="title-block">
                <h1>Radia Ludo</h1>
                <p>World-first radial Ludo board supporting 3-10 players with orbital yards and 3D dice.</p>
            </div>
            <div class="player-selector">
                <label>PLAYERS</label>
                <input type="number" id="playerCountInput" min="3" max="10" value="4" step="1">
                <label>HUMANS</label>
                <input type="number" id="humanCountInput" min="1" max="4" value="1" step="1">
                <button id="applyPlayersBtn" class="apply-btn">REBUILD BOARD</button>
            </div>
            <button id="hardResetBtn" class="reset-btn">NEW GAME</button>
        </div>
        <div id="scoreContainer" class="score-row"></div>
        <div class="board-shell">
            <canvas id="sharedTrackCanvas" width="700" height="700" class="canvas-platform"></canvas>
        </div>
        <div class="dice-area">
            <div id="radialDice" class="dice-cube">⚀</div>
            <button id="rollSharedBtn" class="roll-btn">🎲 ROLL DICE</button>
            <div id="gameStatusMsg" class="message-box">Fixed: full lap before home • clean yard separation</div>
        </div>
        <footer>⚡ COMPLETE LAP (52 steps) → HOME • supports 3-10 players • radial yards and real capture</footer>
    </div>
</div>
<script type="module" src="game.js" defer></script>
</body>
</html>
