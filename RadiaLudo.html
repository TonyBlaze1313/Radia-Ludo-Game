<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radial Ludo · Fixed Lap Logic & Yard Separation | 3‑8 Players</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: radial-gradient(circle at 30% 20%, #0a2b1a, #031207);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.5);
            border-radius: 70px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .ludo-panel {
            background: #fff2df;
            border-radius: 48px;
            padding: 18px;
            box-shadow: inset 0 0 0 3px #fff7e8, 0 20px 30px rgba(0,0,0,0.4);
        }
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            background: #1f1a0ecc;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 20px;
        }
        .player-selector {
            background: #fbdead;
            border-radius: 40px;
            padding: 5px 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .player-selector label { font-weight: bold; color: #382812; }
        #playerCountInput { width: 70px; font-size: 1.3rem; text-align: center; background: #2c2416; color: #ffeaac; border: none; border-radius: 40px; padding: 5px; font-family: monospace; }
        .apply-btn, .reset-btn { background: #ffaa44; border: none; font-weight: bold; padding: 6px 18px; border-radius: 50px; cursor: pointer; box-shadow: 0 3px 0 #8b5a2b; transition: 0.05s linear; }
        .apply-btn:active, .reset-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #8b5a2b; }
        .reset-btn { background: #7a5a3a; color: #ffefbf; }
        .score-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .player-card {
            background: radial-gradient(ellipse at 30% 30%, #fff5e6, #ffeaC0);
            border-radius: 40px;
            padding: 5px 16px;
            min-width: 90px;
            text-align: center;
            box-shadow: 0 4px 0 #b97f3a;
            transition: 0.1s;
        }
        .player-card.active-turn {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px gold, 0 4px 0 #b97f3a;
            background: radial-gradient(ellipse at 30% 30%, #fff2cf, #ffe3aa);
        }
        .player-name { font-weight: bold; font-size: 1rem; }
        .player-score { font-size: 1.9rem; font-weight: 800; line-height: 1; color: #3e2a13; }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 48px;
            background: #ecd48c;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .dice-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .dice-cube {
            width: 80px;
            height: 80px;
            background: #fffff0;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            font-weight: bold;
            box-shadow: 0 10px 0 #ad6b35;
            cursor: pointer;
            background: radial-gradient(circle at 35% 35%, #fff, #f5e2bf);
        }
        .roll-btn {
            background: #f5a623;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #a0550e;
        }
        .message-box {
            background: #2c2419dd;
            backdrop-filter: blur(6px);
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ffecb3;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 15px;
            color: #ffefcf;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="ludo-panel">
        <div class="top-bar">
            <div class="player-selector">
                <label>👥 PLAYERS:</label>
                <input type="number" id="playerCountInput" min="3" max="8" value="4" step="1">
                <button id="applyPlayersBtn" class="apply-btn">⟳ REBUILD BOARD</button>
            </div>
            <button id="hardResetBtn" class="reset-btn">🔄 NEW GAME</button>
        </div>
        <div id="scoreContainer" class="score-row"></div>
        <canvas id="sharedTrackCanvas" width="700" height="700"></canvas>
        <div class="dice-area">
            <div id="radialDice" class="dice-cube">⚀</div>
            <button id="rollSharedBtn" class="roll-btn">🎲 ROLL DICE</button>
            <div id="gameStatusMsg" class="message-box">Fixed: full lap before home • clean yard separation</div>
        </div>
        <footer>⚡ COMPLETE LAP (52 steps) → HOME • yards clearly away from track • real capture</footer>
    </div>
</div>
<script>
    (function(){
        // ---------- FIXED LAP LOGIC & YARD SEPARATION ----------
        let numPlayers = 4;
        const playerColors = ["#E34234","#2E8B57","#FFD700","#1E88E5","#FF6AC2","#9B59B6","#F39C12","#1ABC9C"];
        let playerNames = [];
        let startStepPerPlayer = [];     // which global step index (0..51) is this player's start?
        let homeStretchCoords = [];      // per player: array of {x,y} for home stretch (6 steps)
        
        // Token state: each token = stepCount (0..52) where:
        //   0 = just entered track (at startStep)
        //   1..51 = on global track
        //   52 = ready to enter home stretch (first home step)
        //   53..58 = inside home stretch
        //   99 = finished
        let tokens = [];
        let currentPlayer = 0;
        let diceValue = 0;
        let extraTurn = false;
        let gameWinner = null;
        let gameMessage = "";
        let validGlowTokens = [];
        
        let globalTrackCoords = [];      // 52 positions on outer ring
        let yardPositionsRing = [];       // per player, per token: {x,y}
        
        const canvas = document.getElementById('sharedTrackCanvas');
        const ctx = canvas.getContext('2d');
        let width = 700, height = 700;
        canvas.width = width; canvas.height = height;
        
        // ---------- SOUND ----------
        let audioCtx = null;
        function playTone(freq, duration, type='sine') {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.start();
            osc.stop(now + duration);
        }
        function playDiceRoll() { playTone(880,0.1); setTimeout(()=>playTone(660,0.1),50); }
        function playCapture() { playTone(220,0.2,'sawtooth'); }
        function playWin() { playTone(523.25,0.3); setTimeout(()=>playTone(659.25,0.3),100); setTimeout(()=>playTone(783.99,0.5),200); }
        function playMove() { playTone(440,0.05); }
        
        // ---------- GEOMETRY WITH WIDER YARD SEPARATION ----------
        function buildGeometry() {
            const center = {x: width/2, y: height/2};
            const outerRadius = Math.min(width, height) * 0.42;      // global track
            const yardOuterRadius = Math.min(width, height) * 0.38;  // outer edge of yard ring (just inside track)
            const yardInnerRadius = Math.min(width, height) * 0.26;  // inner edge of yard ring (clear separation)
            const homeStartRadius = Math.min(width, height) * 0.22;   // where home stretch begins
            const finishRadius = Math.min(width, height) * 0.08;
            
            // global track (52 positions)
            globalTrackCoords = [];
            for(let i=0; i<52; i++) {
                let angle = (i / 52) * Math.PI * 2 - Math.PI/2;
                globalTrackCoords.push({x: center.x + outerRadius * Math.cos(angle), y: center.y + outerRadius * Math.sin(angle)});
            }
            
            // home stretches: from start step inward
            const sectorAngle = (Math.PI*2)/numPlayers;
            const startOffset = -Math.PI/2;
            homeStretchCoords = [];
            for(let p=0; p<numPlayers; p++) {
                let startPos = globalTrackCoords[startStepPerPlayer[p]];
                let targetAngle = startOffset + p * sectorAngle;
                let endPos = {x: center.x + finishRadius * Math.cos(targetAngle), y: center.y + finishRadius * Math.sin(targetAngle)};
                let steps = 6;
                let path = [];
                for(let s=0; s<=steps; s++) {
                    let t = s / steps;
                    let x = startPos.x * (1-t) + endPos.x * t;
                    let y = startPos.y * (1-t) + endPos.y * t;
                    path.push({x,y});
                }
                homeStretchCoords.push(path);
            }
            
            // Yard ring: positioned clearly away from track, between yardOuterRadius and yardInnerRadius
            yardPositionsRing = [];
            for(let p=0; p<numPlayers; p++) {
                let startAngle = startOffset + p * sectorAngle;
                let midAngle = startAngle + sectorAngle / 2;
                let r = (yardOuterRadius + yardInnerRadius) / 2;  // middle of yard band
                let baseX = center.x + r * Math.cos(midAngle);
                let baseY = center.y + r * Math.sin(midAngle);
                // offsets spread out radially & tangentially for better visibility
                let offsets = [[-14,-10],[14,-10],[-14,12],[14,12]];
                let spots = [];
                for(let t=0; t<4; t++) {
                    spots.push({x: baseX + offsets[t][0], y: baseY + offsets[t][1]});
                }
                yardPositionsRing.push(spots);
            }
        }
        
        function assignStartSteps() {
            let stepInterval = Math.floor(52 / numPlayers);
            startStepPerPlayer = [];
            for(let i=0; i<numPlayers; i++) {
                startStepPerPlayer.push((i * stepInterval) % 52);
            }
        }
        
        function rebuildGame(reset=true) {
            assignStartSteps();
            buildGeometry();
            playerNames = [];
            for(let i=0; i<numPlayers; i++) playerNames.push(`P${i+1}`);
            if(reset) {
                tokens = [];
                for(let i=0; i<numPlayers; i++) tokens.push([-1, -1, -1, -1]); // -1 means in yard
                currentPlayer = 0;
                diceValue = 0;
                extraTurn = false;
                gameWinner = null;
                gameMessage = `${playerNames[0]}'s turn • Roll dice (fixed lap logic)`;
                validGlowTokens = [];
            }
            updateUI();
            drawBoard();
        }
        
        // ---------- HELPER: get physical position from token state ----------
        function getTokenPosition(playerIdx, tokenIdx) {
            let stepVal = tokens[playerIdx][tokenIdx];
            if(stepVal === -1) {
                return yardPositionsRing[playerIdx][tokenIdx];
            }
            if(stepVal === 99) {
                // finished: at the end of home stretch
                let last = homeStretchCoords[playerIdx][homeStretchCoords[playerIdx].length-1];
                return last;
            }
            if(stepVal >= 0 && stepVal < 52) {
                // on global track: position = startStep + stepVal (mod 52)
                let globalIdx = (startStepPerPlayer[playerIdx] + stepVal) % 52;
                return globalTrackCoords[globalIdx];
            }
            if(stepVal >= 52 && stepVal < 58) {
                let homeIdx = stepVal - 52;
                if(homeIdx < homeStretchCoords[playerIdx].length) {
                    return homeStretchCoords[playerIdx][homeIdx];
                }
            }
            return null;
        }
        
        // ---------- GAME RULES (fixed lap logic) ----------
        const SAFE_STEPS = new Set([0,8,16,24,32,40,48]);
        function isSafeStep(stepCount) {
            // safety is based on global index = (startStep + stepCount) % 52
            return SAFE_STEPS.has(stepCount % 52);
        }
        
        function getScore(p) { return tokens[p].filter(v => v === 99).length; }
        function checkWinner() { for(let i=0;i<numPlayers;i++) if(getScore(i)===4) return i; return null; }
        
        function canMovePiece(pIdx, stepVal, dice) {
            if(stepVal === 99) return false;
            if(stepVal === -1) return dice === 6;
            if(stepVal >= 0 && stepVal < 52) {
                let newStep = stepVal + dice;
                return newStep <= 52;   // 52 means ready for home stretch
            }
            // already on home stretch
            if(stepVal >= 52 && stepVal < 58) {
                let newStep = stepVal + dice;
                return newStep <= 58;   // max 57 then 99
            }
            return false;
        }
        
        function applyCapture(playerIdx, newStepCount, newPhysicalIdx) {
            // capture only applies on global track (stepCount < 52)
            if(newStepCount >= 52) return false;
            // compute global index
            let globalIdx = (startStepPerPlayer[playerIdx] + newStepCount) % 52;
            if(isSafeStep(newStepCount)) return false;
            let captured = false;
            for(let p=0; p<numPlayers; p++) {
                if(p === playerIdx) continue;
                for(let t=0; t<4; t++) {
                    let other = tokens[p][t];
                    if(other >= 0 && other < 52) {
                        let otherGlobal = (startStepPerPlayer[p] + other) % 52;
                        if(otherGlobal === globalIdx) {
                            tokens[p][t] = -1;
                            captured = true;
                            playCapture();
                            gameMessage += ` ⚔️ Captured ${playerNames[p]}!`;
                        }
                    }
                }
            }
            return captured;
        }
        
        function movePiece(pIdx, tIdx, dice) {
            let current = tokens[pIdx][tIdx];
            if(current === -1 && dice === 6) {
                tokens[pIdx][tIdx] = 0;   // enter track at stepCount 0
                playMove();
                applyCapture(pIdx, 0, 0);
                return true;
            }
            if(current >= 0 && current < 52) {
                let newStep = current + dice;
                if(newStep <= 52) {
                    tokens[pIdx][tIdx] = newStep;
                    if(newStep < 52) applyCapture(pIdx, newStep, 0);
                    playMove();
                    if(newStep === 52) {
                        gameMessage = `🎉 ${playerNames[pIdx]} reaches home stretch!`;
                    }
                    return true;
                }
            }
            else if(current >= 52 && current < 58) {
                let newStep = current + dice;
                let homeLen = homeStretchCoords[pIdx].length; // 7 steps (0..6)
                if(newStep <= 57) {
                    tokens[pIdx][tIdx] = newStep;
                    playMove();
                    if(newStep === 57) {
                        tokens[pIdx][tIdx] = 99;
                        gameMessage = `🎉 ${playerNames[pIdx]} finished a token!`;
                        playWin();
                    }
                    return true;
                }
            }
            return false;
        }
        
        function getValidMoves(pIdx, dice) {
            let valid = [];
            for(let i=0;i<4;i++) {
                if(canMovePiece(pIdx, tokens[pIdx][i], dice)) valid.push(i);
            }
            return valid;
        }
        
        function nextTurn() {
            if(gameWinner) return;
            if(extraTurn) {
                extraTurn = false;
                gameMessage = `${playerNames[currentPlayer]} extra turn! Roll again.`;
                return;
            }
            do {
                currentPlayer = (currentPlayer + 1) % numPlayers;
            } while(getScore(currentPlayer) === 4);
            gameMessage = `${playerNames[currentPlayer]}'s turn • Roll dice`;
            validGlowTokens = [];
        }
        
        function rollDice() {
            if(gameWinner) { gameMessage = `Game over, reset.`; updateUI(); drawBoard(); return; }
            playDiceRoll();
            let dice = Math.floor(Math.random()*6)+1;
            diceValue = dice;
            updateDiceUI(dice);
            let valid = getValidMoves(currentPlayer, dice);
            if(valid.length === 0) {
                gameMessage = `${playerNames[currentPlayer]} rolled ${dice} • No moves → turn ends.`;
                extraTurn = false;
                nextTurn();
                diceValue = 0;
                updateDiceUI(0);
                drawBoard(); updateUI();
                return;
            }
            gameMessage = `${playerNames[currentPlayer]} rolled ${dice}! Click a glowing token.`;
            validGlowTokens = valid;
            drawBoard(); updateUI();
        }
        
        function attemptMove(tokenIdx) {
            if(gameWinner || diceValue===0) { if(diceValue===0) gameMessage="Roll first!"; updateUI(); drawBoard(); return; }
            let valid = getValidMoves(currentPlayer, diceValue);
            if(!valid.includes(tokenIdx)) { gameMessage = `Cannot move token ${tokenIdx+1}.`; updateUI(); drawBoard(); return; }
            movePiece(currentPlayer, tokenIdx, diceValue);
            let winner = checkWinner();
            if(winner !== null) {
                gameWinner = winner;
                gameMessage = `🏆🏆 ${playerNames[winner]} WINS! 🏆🏆`;
                playWin();
                diceValue = 0;
                updateDiceUI(0);
                validGlowTokens = [];
                drawBoard(); updateUI();
                return;
            }
            let six = (diceValue === 6);
            diceValue = 0;
            updateDiceUI(0);
            if(six) extraTurn = true;
            else extraTurn = false;
            nextTurn();
            validGlowTokens = [];
            drawBoard(); updateUI();
        }
        
        // ---------- DRAWING (same as before, using getTokenPosition) ----------
        function drawBoard() {
            ctx.clearRect(0,0,width,height);
            ctx.fillStyle = "#ecd48c";
            ctx.fillRect(0,0,width,height);
            
            const center = {x: width/2, y: height/2};
            const outerRadius = Math.min(width, height)*0.22;
            const sectorAngle = (2*Math.PI)/numPlayers;
            const startOffset = -Math.PI/2;
            
            // Yard ring (translucent sectors)
            for(let p=0; p<numPlayers; p++) {
                let ang1 = startOffset + p * sectorAngle;
                let ang2 = ang1 + sectorAngle;
                ctx.beginPath();
                ctx.arc(center.x, center.y, outerRadius, ang1, ang2);
                ctx.arc(center.x, center.y, yardInnerRadius, ang2, ang1, true);
                ctx.closePath();
                ctx.fillStyle = playerColors[p] + "30";
                ctx.fill();
                ctx.strokeStyle = playerColors[p];
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            
            // Home stretch inner wedges
            for(let p=0; p<numPlayers; p++) {
                let ang1 = startOffset + p * sectorAngle;
                let ang2 = ang1 + sectorAngle;
                ctx.beginPath();
                ctx.arc(center.x, center.y, homeStartRadius, ang1, ang2);
                ctx.arc(center.x, center.y, 0, ang2, ang1, true);
                ctx.closePath();
                ctx.fillStyle = playerColors[p] + "40";
                ctx.fill();
            }
            
            // Global track cells
            for(let i=0;i<globalTrackCoords.length;i++) {
                ctx.beginPath();
                ctx.arc(globalTrackCoords[i].x, globalTrackCoords[i].y, 9, 0, 2*Math.PI);
                ctx.fillStyle = "#FCEB9C";
                ctx.fill();
                ctx.strokeStyle = "#b97f3a";
                ctx.stroke();
                if(SAFE_STEPS.has(i)) {
                    ctx.beginPath();
                    ctx.arc(globalTrackCoords[i].x, globalTrackCoords[i].y, 13, 0, 2*Math.PI);
                    ctx.fillStyle = "#FFD966aa";
                    ctx.fill();
                }
            }
            
            // Home stretch small circles
            for(let p=0;p<numPlayers;p++) {
                let path = homeStretchCoords[p];
                for(let i=0;i<path.length;i++) {
                    ctx.beginPath();
                    ctx.arc(path[i].x, path[i].y, 7, 0, 2*Math.PI);
                    ctx.fillStyle = playerColors[p]+"aa";
                    ctx.fill();
                }
            }
            
            // Draw all tokens using getTokenPosition
            for(let p=0;p<numPlayers;p++) {
                for(let t=0;t<4;t++) {
                    let pos = getTokenPosition(p, t);
                    if(pos) {
                        ctx.shadowBlur = 4;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, 14, 0, 2*Math.PI);
                        ctx.fillStyle = playerColors[p];
                        ctx.fill();
                        ctx.fillStyle = "white";
                        ctx.font = "bold 15px Segoe UI";
                        ctx.fillText(${t+1}, pos.x-6, pos.y+6);
                        if(validGlowTokens.includes(t) && p === currentPlayer && !gameWinner) {
                            ctx.beginPath();
                            ctx.arc(pos.x, pos.y, 19, 0, 2*Math.PI);
                            ctx.strokeStyle = "gold";
                            ctx.lineWidth = 3.5;
                            ctx.stroke();
                        }
                        ctx.shadowBlur = 0;
                    }
                }
            }
            
            // Highlight current player sector
            if(!gameWinner) {
                let ang1 = startOffset + currentPlayer * sectorAngle;
                let ang2 = ang1 + sectorAngle;
                ctx.beginPath();
                ctx.arc(center.x, center.y, outerRadius+5, ang1, ang2);
              ctx.lineWidth = 4;
                ctx.strokeStyle = "#FFFBA0";
                ctx.stroke();
            }
        }
        
        function updateUI() {
            let container = document.getElementById('scoreContainer');
            let html = '';
            for(let i=0;i<numPlayers;i++) {
                let active = (i===currentPlayer && !gameWinner) ? 'active-turn' : '';
                html += <div class="player-card ${active}" style="border-left: 6px solid ${playerColors[i]}">
                            <div class="player-name">${playerNames[i]}</div>
                            <div class="player-score">${getScore(i)}</div>
                            <div style="font-size:0.7rem;">🏆/4</div>
                        </div>;
            }
            container.innerHTML = html;
            document.getElementById('gameStatusMsg').innerHTML = gameWinner ? 🏆 WINNER: ${playerNames[gameWinner]} 🏆 : gameMessage;
        }
        
        function updateDiceUI(val) {
            const map = {0:"⚀",1:"⚀",2:"⚁",3:"⚂",4:"⚃",5:"⚄",6:"⚅"};
            document.getElementById('radialDice').innerText = map[val];
        }
        
        function handleCanvasClick(e) {
            if(gameWinner) return;
            if(diceValue === 0) { gameMessage = "Roll first!"; updateUI(); drawBoard(); return; }
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx = (e.clientX - rect.left) * scaleX;
            let my = (e.clientY - rect.top) * scaleY;
            for(let tk=0; tk<4; tk++) {
                let pos = getTokenPosition(currentPlayer, tk);
                if(pos && Math.hypot(mx-pos.x, my-pos.y) < 22) {
                    attemptMove(tk);
                    drawBoard();
                    updateUI();
                    break;
                }
            }
        }
        
        document.getElementById('applyPlayersBtn').addEventListener('click', ()=>{
            let val = parseInt(document.getElementById('playerCountInput').value);
            if(val>=3 && val<=8) numPlayers = val;
            else numPlayers = 4;
            rebuildGame(true);
            drawBoard();
        });
        document.getElementById('hardResetBtn').addEventListener('click', ()=>{ rebuildGame(true); drawBoard(); });
        document.getElementById('rollSharedBtn').addEventListener('click', ()=>{ rollDice(); });
        canvas.addEventListener('click', handleCanvasClick);
        
        rebuildGame(true);
        drawBoard();
    })();
</script>
</body>
</html>
